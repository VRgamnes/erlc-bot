name: Sync ERLC Command Logs to Google Sheets

on:
  schedule:
    - cron: "*/6 * * * *"  # every 10 minutes
  workflow_dispatch: {}      # lets you run it manually from the Actions tab

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch and sync to Sheets
        env:
          ERLC_SERVER_KEY: ${{ secrets.ERLC_SERVER_KEY }}
          SHEETS_WEBHOOK_URL: ${{ secrets.SHEETS_WEBHOOK_URL }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
        run: node scripts/fetch-logs.js

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/seen.json
          git diff --staged --quiet || git commit -m "Update sync state"
          git push
