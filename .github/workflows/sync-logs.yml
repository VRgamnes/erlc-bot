name: Sync ERLC Command Logs to Google Sheets

on:
  schedule:
    - cron: '0/5 * * * *'  # every 5 minutes
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch and sync ERLC logs
        env:
          ERLC_SERVER_KEY: ${{ secrets.ERLC_SERVER_KEY }}
          SHEETS_WEBHOOK_URL: ${{ secrets.SHEETS_WEBHOOK_URL }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
        run: node scripts/fetch-logs.js

      - name: Commit updated state
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update ERLC log sync state"
          file_pattern: data/seen.json
          commit_user_name: "ERLC Sync Bot"
          commit_user_email: "bot@github-actions.local"
