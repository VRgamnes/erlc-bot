name: Sync ERLC Command Logs to Google Sheets

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install packages
        run: npm install

      - name: Fetch and sync to Sheets
        env:
          ERLC_SERVER_KEY: ${{ secrets.ERLC_SERVER_KEY }}
          SHEETS_WEBHOOK_URL: ${{ secrets.SHEETS_WEBHOOK_URL }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
        run: node scripts/fetch-logs.js

      - name: Commit updated state
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update sync state"
          file_pattern: data/seen.json
          commit_user_name: "ERLC Sync Bot"
          commit_user_email: "bot@github-actions.local"
